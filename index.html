<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>🤖 SJ AI</h1>
    <p>One AI. Any Language. Any Question.</p>
</header>

<main class="chat-container">

    <div id="chat-box">
        <div class="ai-message">
            👋 Hello! I am SJ AI.<br><br>
            Ask me anything in any language.
        </div>
    </div>

</main>

<div class="input-area">

<input
type="text"
id="user-input"
placeholder="Ask anything..."
autocomplete="off">

<button id="send-btn">
Send
</button>

</div>

<script src="script.js"></script>

</body>
    </html>
