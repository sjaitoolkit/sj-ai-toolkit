<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
padding:12px;
border-radius:12px;
margin-bottom:12px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1f2937;
}

.input-area{
display:flex;
padding:10px;
background:#111827;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#10b981;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<header>🤖 SJ AI</header>

<div id="chat">
<div class="message ai">
👋 Hello! I'm SJ AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input type="text" placeholder="Type your message...">
<button>Send</button>
</div>

</body>
  </html>
